        code: "import re\nimport json\nfrom typing import Dict, Any, List\n\n\ndef\
          \ main(input_data: List[Dict]) -> Dict[str, Any]:\n    try:\n        all_items\
          \ = []\n\n        for data in input_data:\n            if not data or not\
          \ isinstance(data, str):\n                continue\n\n            # 뉴스 블록을\
          \ '---' 기준으로 분리\n            blocks = data.split('---')\n\n            for\
          \ block in blocks:\n                block = block.strip()\n            \
          \    if not block:\n                    continue\n\n                # 제목\
          \ 추출: ## 1. 제목 형태\n                title_match = re.search(r'##\\s+\\d+\\\
          .\\s+(.+)', block)\n                if not title_match:\n              \
          \      continue\n                title = title_match.group(1).strip()\n\n\
          \                # 발행일 추출\n                date_match = re.search(r'\\*\\\
          *발행일:\\*\\*\\s+(.+)', block)\n                pub_date = date_match.group(1).strip()\
          \ if date_match else ''\n\n                # 링크 추출\n                link_match\
          \ = re.search(r'\\[원문 보기\\]\\((.+?)\\)', block)\n                link =\
          \ link_match.group(1).strip() if link_match else ''\n\n                #\
          \ 요약 추출\n                desc_match = re.search(r'\\*\\*요약:\\*\\*\\s*\\\
          n(.+?)(?:\\n\\n|$)', block, re.DOTALL)\n                description = desc_match.group(1).strip()\
          \ if desc_match else ''\n\n                all_items.append({\n        \
          \            'title': title,\n                    'originallink': link,\n\
          \                    'link': link,\n                    'description': description,\n\
          \                    'pubDate': pub_date\n                })\n\n       \
          \ # 중복 제거\n        total_original = len(all_items)\n        seen_keys =\
          \ set()\n        unique_items = []\n\n        for item in all_items:\n \
          \           key = item.get('originallink') or item.get('title', '')\n  \
          \          if key and key not in seen_keys:\n                seen_keys.add(key)\n\
          \                unique_items.append(item)\n\n        output = {\n     \
          \       'unique_items': unique_items,\n            'removed_count': total_original\
          \ - len(unique_items),\n            'total_original': total_original,\n\
          \            'total_unique': len(unique_items)\n        }\n\n        return\
          \ {'result': json.dumps(output, ensure_ascii=False)}\n\n    except Exception\
          \ as e:\n        return {'result': json.dumps({'error': str(e)}, ensure_ascii=False)}\n"
