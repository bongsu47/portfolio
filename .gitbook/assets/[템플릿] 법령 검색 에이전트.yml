      tool_label: 법령 검색 도구
      tool_name: law_search
      tool_parameters:
        output_format: string
        query: ''
  annotation_reply:
    enabled: false
  chat_prompt_config: {}
  completion_prompt_config: {}
  dataset_configs:
    datasets:
      datasets: []
